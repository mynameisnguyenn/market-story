# Dark theme tuned for a financial dashboard
[theme]
base = "dark"
primaryColor = "#4C9AFF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#161B26"
textColor = "#E6E6E6"
font = "sans serif"

# headless=true is required for hosting (Streamlit Cloud); the local launcher
# (Launch Market Story.bat) passes --server.headless false to auto-open the browser.
[server]
headless = true
runOnSave = true

[browser]
gatherUsageStats = false

# Hide the developer toolbar so the hosted app reads like an app, not a dev tool —
# cleaner on a phone home-screen / installed-PWA view. (In-app "Refresh data" still works.)
[client]
toolbarMode = "minimal"
