# Ellis-dark theme: warm near-black + electric-cyan accent (keep in sync with styles.css :root)
[theme]
base = "dark"
primaryColor = "#7beafb"               # electric cyan — drives tab underline, widgets, focus
backgroundColor = "#0d0c0c"            # warm near-black (Ellis)
secondaryBackgroundColor = "#1b1611"   # warm dark surfaces (sidebar, table headers)
textColor = "#f5f2ef"                  # warm off-white
font = "sans serif"

# headless=true is required for hosting (Streamlit Cloud); the local launcher
# (Launch Market Story.bat) passes --server.headless false to auto-open the browser.
[server]
headless = true
runOnSave = true

[browser]
gatherUsageStats = false

# Hide the developer toolbar so the hosted app reads like an app, not a dev tool —
# cleaner on a phone home-screen / installed-PWA view. (In-app "Refresh data" still works.)
[client]
toolbarMode = "minimal"
