<!DOCTYPE html>
<!-- @dsCard group="Components" name="Tabs & buttons" subtitle="Accent-underlined tabs, primary button" viewport="700x150" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="display:flex; gap:22px; border-bottom:1px solid var(--border); padding-bottom:0">
  <span style="font-family:var(--grot); font-weight:600; font-size:.95rem; color:var(--accent); padding-bottom:9px; border-bottom:2px solid var(--accent); margin-bottom:-1px">Overview</span>
  <span style="font-family:var(--grot); font-weight:600; font-size:.95rem; color:var(--text-dim); padding-bottom:9px">Story</span>
  <span style="font-family:var(--grot); font-weight:600; font-size:.95rem; color:var(--text-dim); padding-bottom:9px">Equities &amp; Sectors</span>
  <span style="font-family:var(--grot); font-weight:600; font-size:.95rem; color:var(--text-dim); padding-bottom:9px">Global &amp; Macro</span>
  <span style="font-family:var(--grot); font-weight:600; font-size:.95rem; color:var(--text-dim); padding-bottom:9px">Trends</span>
</div>
<div style="display:flex; gap:10px; margin-top:18px; align-items:center">
  <button style="font-family:var(--grot); font-weight:600; font-size:.82rem; color:var(--bg); background:var(--accent); border:none; border-radius:8px; padding:8px 16px; cursor:pointer">Refresh data</button>
  <span style="font-family:var(--grot); font-weight:600; font-size:.82rem; color:var(--text); background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 16px">Secondary</span>
  <span class="mono" style="font-size:.72rem; color:var(--text-dim); margin-left:6px">active tab text → accent · underline follows accent</span>
</div>
</body></html>
