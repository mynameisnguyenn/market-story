<!DOCTYPE html>
<!-- @dsCard group="Components" name="Signal dots & badges" subtitle="Tone-colored dots, regime badges" viewport="700x195" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="eyebrow" style="margin-bottom:12px">Signal dots &amp; tone spans — colored by semantic token</div>
<div style="display:flex; flex-direction:column; gap:9px; font-size:.92rem">
  <div><span style="color:var(--up)">●</span>&nbsp; Copper at 98th 1-year percentile — the cyclical tell hasn't flinched.</div>
  <div><span style="color:var(--down)">●</span>&nbsp; WTI −3.2% overnight; the energy hedge is gone.</div>
  <div><span style="color:var(--warn)">●</span>&nbsp; Private credit gate — watch for contagion.</div>
  <div><span style="color:var(--neutral)">●</span>&nbsp; HY OAS unchanged at the 3rd %ile.</div>
</div>
<div style="display:flex; gap:8px; margin-top:16px">
  <span style="font-family:var(--grot); font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--up); border:1px solid var(--up); border-radius:6px; padding:3px 9px">Risk-on</span>
  <span style="font-family:var(--grot); font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--down); border:1px solid var(--down); border-radius:6px; padding:3px 9px">De-risking</span>
  <span style="font-family:var(--grot); font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); border:1px solid var(--accent); border-radius:6px; padding:3px 9px">⚡ Today's signal</span>
</div>
</body></html>
