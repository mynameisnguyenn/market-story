<!DOCTYPE html>
<!-- @dsCard group="Components" name="Data table" subtitle="Dense mono table, green/red change cells" viewport="700x215" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<table style="width:100%; border-collapse:collapse; font-size:.84rem">
  <thead>
    <tr style="background:var(--surface-2); text-align:left">
      <th style="padding:7px 12px; font-family:var(--grot); font-weight:600; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim)">Instrument</th>
      <th style="padding:7px 12px; font-family:var(--grot); font-weight:600; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); text-align:right">Last</th>
      <th style="padding:7px 12px; font-family:var(--grot); font-weight:600; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); text-align:right">1D</th>
      <th style="padding:7px 12px; font-family:var(--grot); font-weight:600; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); text-align:right">YTD %</th>
    </tr>
  </thead>
  <tbody class="mono">
    <tr style="border-bottom:1px solid var(--grid)"><td style="padding:6px 12px; font-family:var(--grot)">S&amp;P 500</td><td style="padding:6px 12px; text-align:right">5,944.10</td><td style="padding:6px 12px; text-align:right; color:var(--up)">+0.42</td><td style="padding:6px 12px; text-align:right; color:var(--up)">+11.20</td></tr>
    <tr style="border-bottom:1px solid var(--grid)"><td style="padding:6px 12px; font-family:var(--grot)">Gold</td><td style="padding:6px 12px; text-align:right">2,412.00</td><td style="padding:6px 12px; text-align:right; color:var(--down)">−0.30</td><td style="padding:6px 12px; text-align:right; color:var(--up)">+9.10</td></tr>
    <tr><td style="padding:6px 12px; font-family:var(--grot)">HY OAS (bps)</td><td style="padding:6px 12px; text-align:right">312.0</td><td style="padding:6px 12px; text-align:right; color:var(--down)">−2.00</td><td style="padding:6px 12px; text-align:right; color:var(--neutral)">n/a</td></tr>
  </tbody>
</table>
<div style="font-size:.68rem; color:var(--text-dim); margin-top:8px">Dense, mono, tabular figures. Change columns colored by the single green/red.</div>
</body></html>
