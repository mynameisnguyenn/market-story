<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation & the accent bar" subtitle="Hairline borders, no shadows, 3px accent left-bar" viewport="700x195" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="eyebrow" style="margin-bottom:14px">Elevation = warm hairline borders, not shadow</div>
<div class="row">
  <div style="flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px">
    <div style="font-size:.7rem; color:var(--text-dim)">rest</div>
    <div style="font-family:var(--mono); font-size:.66rem; color:var(--text-dim); margin-top:6px">border #2b2620</div>
  </div>
  <div style="flex:1; background:var(--surface); border:1px solid var(--border-strong); border-radius:10px; padding:14px">
    <div style="font-size:.7rem; color:var(--text)">hover</div>
    <div style="font-family:var(--mono); font-size:.66rem; color:var(--text-dim); margin-top:6px">border #3a332b</div>
  </div>
  <div style="flex:1.2; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:14px">
    <div style="font-size:.7rem; color:var(--text)">the signature</div>
    <div style="font-family:var(--mono); font-size:.66rem; color:var(--accent); margin-top:6px">3px accent left-bar</div>
  </div>
</div>
<div style="font-size:.72rem; color:var(--text-dim); margin-top:12px; line-height:1.45">Essentially <b style="color:var(--text)">no drop shadows</b> in the product. Depth comes from surface warmth + a 1px border. Hover brightens the border.</div>
</body></html>
