<!DOCTYPE html>
<!-- @dsCard group="Components" name="Today's read hero" subtitle="The signature serif read card" viewport="700x170" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div style="background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:10px; padding:16px 20px">
  <div style="font-family:var(--grot); font-size:.66rem; text-transform:uppercase; letter-spacing:.13em; color:var(--accent); margin-bottom:6px">● Today's read</div>
  <div style="font-family:var(--serif); font-size:1.5rem; line-height:1.3; color:var(--text)">The oil floor broke while gold caught a simultaneous +$55 bid — a demand-concern repricing, not an Iran-risk relief trade.</div>
  <div style="font-size:.78rem; color:var(--text-dim); margin-top:9px">Full read in the <b style="color:var(--text)">Story</b> tab →</div>
</div>
</body></html>
