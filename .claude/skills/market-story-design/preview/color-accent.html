<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Accent — electric cyan" subtitle="The single product accent + hover" viewport="700x150" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row">
  <div class="col" style="flex:1.3">
    <div class="swatch" style="background:#7beafb"><span class="sw-hex" style="color:#0d0c0c">electric cyan</span></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--accent)">Accent</span><span class="sw-hex mono">#7beafb</span></div>
  </div>
  <div class="col" style="flex:1.3">
    <div class="swatch" style="background:#a6f1ff"></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--accent-bright)">Accent hover</span><span class="sw-hex mono">#a6f1ff</span></div>
  </div>
  <div class="col" style="flex:1.8; justify-content:center; padding-left:8px">
    <div style="font-family:var(--serif); font-size:1.1rem; color:var(--text)">The single accent.</div>
    <div style="font-size:.74rem; color:var(--text-dim); line-height:1.45; margin-top:4px">Links, the metric-card left bar, active tab underline, chart lines, focus rings — and almost nothing else.</div>
    <div style="margin-top:8px"><a href="#" style="color:var(--accent); font-size:.8rem; border-bottom:1px solid var(--accent)">a cyan link →</a></div>
  </div>
</div>
</body></html>
