<!DOCTYPE html>
<!-- @dsCard group="Components" name="KPI metric card" subtitle="Accent left-bar, mono value, inverted VIX" viewport="700x160" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row">
  <div style="flex:1; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:13px 16px 11px">
    <div style="font-family:var(--grot); font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; opacity:.72">S&amp;P 500</div>
    <div class="mono" style="font-size:1.5rem; font-weight:600; margin-top:4px">5,944</div>
    <div class="mono" style="font-size:.85rem; color:var(--up); margin-top:2px">+0.42%</div>
  </div>
  <div style="flex:1; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; padding:13px 16px 11px">
    <div style="font-family:var(--grot); font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; opacity:.72">VIX</div>
    <div class="mono" style="font-size:1.5rem; font-weight:600; margin-top:4px">16.1</div>
    <div class="mono" style="font-size:.85rem; color:var(--up); margin-top:2px">−3.1% ▾</div>
  </div>
  <div style="flex:1; background:var(--surface); border:1px solid var(--border-strong); border-left:3px solid var(--accent-bright); border-radius:10px; padding:13px 16px 11px">
    <div style="font-family:var(--grot); font-weight:600; font-size:.7rem; text-transform:uppercase; letter-spacing:.09em; opacity:.72">10Y Treasury</div>
    <div class="mono" style="font-size:1.5rem; font-weight:600; margin-top:4px">4.21%</div>
    <div class="mono" style="font-size:.85rem; color:var(--down); margin-top:2px">+2 bps</div>
  </div>
</div>
<div style="font-size:.68rem; color:var(--text-dim); margin-top:10px">KPI metric card — third shown in hover state. VIX delta inverts (green on a fall).</div>
</body></html>
