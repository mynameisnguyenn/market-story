<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Semantic — one green / one red" subtitle="Up, down, warn, neutral — the only gain/loss cues" viewport="700x195" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="row">
  <div class="col" style="flex:1">
    <div class="swatch" style="background:#36c26f"><span class="sw-hex" style="color:#0d0c0c">▲ gains</span></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--up)">Up</span><span class="sw-hex mono">#36c26f</span></div>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:#ff5c6c"><span class="sw-hex" style="color:#0d0c0c">▼ losses</span></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--down)">Down</span><span class="sw-hex mono">#ff5c6c</span></div>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:#f5a623"><span class="sw-hex" style="color:#0d0c0c">caution</span></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--warn)">Warn</span><span class="sw-hex mono">#f5a623</span></div>
  </div>
  <div class="col" style="flex:1">
    <div class="swatch" style="background:#b3aaa0"><span class="sw-hex" style="color:#0d0c0c">n/a</span></div>
    <div class="chiplabel"><span class="sw-name" style="color:var(--neutral)">Neutral</span><span class="sw-hex mono">#b3aaa0</span></div>
  </div>
</div>
<div style="font-size:.72rem; color:var(--text-dim); margin-top:14px; line-height:1.45">
  <b style="color:var(--text)">One green, one red — everywhere.</b> The single source of truth for every gain/loss cue: tables, sparklines, signal dots, the treemap. Never a second green or red. <span style="color:var(--text)">VIX inverts</span> (down is good).
</div>
</body></html>
