<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Cover — unified palette" subtitle="Landing folded into the product: same warm + cyan" viewport="700x170" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="eyebrow" style="margin-bottom:12px">The cover \u2014 unified to the product palette</div>
<div class="row" style="align-items:center; gap:20px">
  <div style="font-family:var(--clash); font-weight:600; font-size:2.1rem; line-height:.86; letter-spacing:-.035em; text-transform:uppercase; color:var(--text)">Market<br>Story<sup style="font-size:.18em; color:var(--text-dim); vertical-align:super">\u00ae</sup></div>
  <div class="col" style="gap:7px">
    <div style="font-size:.74rem; color:var(--text-dim); line-height:1.5; max-width:46ch">Same warm <span class="mono" style="color:var(--text)">#0d0c0c</span> ground + cyan <span class="mono" style="color:var(--accent)">#7beafb</span> as the dashboard. The cover differs only in <b style="color:var(--text)">type</b> (uppercase Clash Display wordmark) and <b style="color:var(--text)">composition</b> (full-bleed market-field) \u2014 never color.</div>
    <div style="display:flex; gap:6px; margin-top:4px">
      <span style="width:34px;height:20px;border-radius:4px;background:#0d0c0c;border:1px solid var(--border)"></span>
      <span style="width:34px;height:20px;border-radius:4px;background:#7beafb"></span>
      <span style="width:34px;height:20px;border-radius:4px;background:#36c26f"></span>
      <span style="width:34px;height:20px;border-radius:4px;background:#ff5c6c"></span>
      <span style="font-family:var(--mono); font-size:.62rem; color:var(--text-dim); align-self:center; margin-left:6px; text-decoration:line-through; opacity:.6">was blue #5aa0ff</span>
    </div>
  </div>
</div>
</body></html>
