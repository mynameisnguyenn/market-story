<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Corner radius" subtitle="Restrained — 6px / 10px" viewport="700x160" --><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="eyebrow" style="margin-bottom:14px">Corner radius — restrained</div>
<div class="row" style="align-items:center">
  <div class="col" style="flex:1; align-items:center; gap:8px">
    <div style="width:80px;height:54px;background:var(--surface);border:1px solid var(--border);border-radius:6px"></div>
    <span class="sw-hex mono">6px · sm</span>
  </div>
  <div class="col" style="flex:1; align-items:center; gap:8px">
    <div style="width:80px;height:54px;background:var(--surface);border:1px solid var(--border);border-radius:10px"></div>
    <span class="sw-name">10px · card</span><span class="sw-hex mono" style="margin-top:-4px">--radius</span>
  </div>
  <div class="col" style="flex:1.4; justify-content:center">
    <div style="font-size:.74rem; color:var(--text-dim); line-height:1.5">Cards, metrics &amp; the read hero use <b style="color:var(--text)">10px</b>. Marketing rows are flat — no rounding at all. Nothing is rounded-and-friendly.</div>
  </div>
</div>
</body></html>
