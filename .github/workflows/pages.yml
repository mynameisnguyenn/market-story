name: Deploy static site (GitHub Pages)

# Builds the framework-free static site from the committed brief and deploys it to GitHub
# Pages — no Streamlit, no login, opens as a URL on desktop/phone (installable as a PWA).
# Runs after each push to main (incl. the daily brief commit) and on demand.
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "src/**"
      - "styles.css"
      - "build_site.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer deploy supersede an in-flight one; don't cancel a run mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the static site (committed data only — no network, no keys)
        run: python build_site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
