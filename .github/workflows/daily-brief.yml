name: Daily brief

# Generate the market brief automatically before the US open so a fresh one is
# waiting each morning. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 12 * * 1-5"   # 12:00 UTC (~7-8am ET), weekdays
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # opt into Node 24 (silences the Node-20 deprecation)

jobs:
  build-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's brief
        run: python run.py
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Commit the brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/briefs/brief_*.json data/briefs/brief_*.md data/timeline.jsonl
          git add data/history/energy.jsonl data/history/labor.jsonl data/history/macro.jsonl
          if git diff --cached --quiet; then
            echo "No brief changes to commit."
          else
            git commit -m "Daily brief ($(date -u +%Y-%m-%d))"
            git push
          fi
